<!doctype html>
<html><head><meta charset="utf-8"><title>Stock</title><link rel="stylesheet" href="/static/style.css"></head>
<body>
<h1>Stock por depósito</h1>
<nav><a href="/">Compras</a> | <a href="/stock">Stock</a> | <a href="/reports">Reportes</a></nav>
<table id="stockTable"><thead><tr><th>Depósito</th><th>SKU</th><th>Item</th><th>Cantidad</th><th>Unidad</th></tr></thead><tbody></tbody></table>
<script>
fetch('/api/reports/stock-by-deposit').then(r=>r.json()).then(rows=>{
 const tb=document.querySelector('#stockTable tbody');
 rows.forEach(r=>{tb.innerHTML += `<tr><td>${r.deposit}</td><td>${r.sku}</td><td>${r.item}</td><td>${r.stock_qty}</td><td>${r.base_unit}</td></tr>`})
})
</script>
</body></html>
